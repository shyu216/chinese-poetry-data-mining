name: chinese-poetry-data-mining
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip=23.0
  
  # 数据处理
  - pandas>=2.0.0
  - numpy>=1.24.0
  
  # 文本处理
  - opencc>=1.1.0
  
  # 机器学习
  - scikit-learn>=1.3.0
  
  # 网络分析
  - networkx>=3.1
  
  # 可视化
  - plotly>=5.14.0
  
  # 进度条
  - tqdm>=4.65.0
  
  # pip 包
  - pip:
    # 文本处理
    - pypinyin>=0.48.0
    
    # 机器学习
    - transformers>=4.30.0
    - torch>=2.0.0
    - node2vec>=0.4.6
    - gensim>=4.3.0
    
    # 可视化
    - pyecharts>=2.0.0
    - dash>=2.11.0
    
    # 中文分词
    - jieba>=0.42.0
    
    # NLP 工具
    - hanlp>=2.1.0
    - jionlp>=1.0.0
    
    # 其他
    - matplotlib>=3.7.0
