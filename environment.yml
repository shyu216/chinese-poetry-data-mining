name: poetry-mining
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # 基础科学计算
  - numpy=1.24
  - pandas=2.0
  - scipy=1.11
  - setuptools=69.5.1
  
  # 机器学习
  - scikit-learn=1.3
  
  # 网络分析
  - networkx=3.1
  
  # 可视化
  - plotly=5.15
  - matplotlib=3.7
  
  # 文本处理
  - jieba=0.42
  
  # 进度条
  - tqdm=4.65
  
  # Jupyter（可选，用于交互式开发）
  - jupyter=1.0
  - ipython=8.14
  
  # 其他工具
  - pyyaml=6.0
  - requests=2.31
  
  # pip 安装的包
  - pip
  - pip:
    # 中文处理
    - opencc-python-reimplemented==0.1.7
    - pypinyin==0.49
    
    # 深度学习（情感分析）
    - torch==2.0.1
    - transformers==4.30.2
    - sentencepiece==0.1.99
    
    # 网络嵌入
    - node2vec==0.4.6
    
    # 其他可视化
    - pyecharts==2.0.4
    - dash==2.11
    
    # 开发工具
    - black==23.7
    - isort==5.12
    - pytest==7.4
    - mypy==1.5
