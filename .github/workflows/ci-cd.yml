name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - refactor/*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: '环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_pipeline:
        description: '运行数据管道'
        required: true
        default: true
        type: boolean

jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: 运行 flake8
        run: flake8 src/ scripts/ --max-line-length=88
      
      - name: 运行 black
        run: black --check src/ scripts/
      
      - name: 运行 isort
        run: isort --check src/ scripts/

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas jieba scikit-learn flask flask-cors
      
      - name: 运行测试
        run: |
          # 这里可以添加测试命令
          echo "测试通过"

  pipeline:
    name: 数据管道
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.run_pipeline == 'true' || github.event_name == 'push'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas jieba scikit-learn flask flask-cors
      
      - name: 运行数据管道
        run: |
          # 运行完整的数据管道
          python scripts/pipeline.py --all
      
      - name: 导出 Web 数据
        run: |
          python scripts/export/web.py
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: web-data
          path: data/output/web/
          retention-days: 7

  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: pipeline
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-data
          path: data/output/web/
      
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/output/web/
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
