<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者相似度搜索 - 古诗词数据分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .search-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .suggestions {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .suggestions.active {
            display: block;
        }
        
        .suggestions h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .suggestion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .suggestion-tag {
            padding: 8px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        
        .suggestion-tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .results-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 400px;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .results-header h2 {
            font-size: 1.5rem;
            color: #333;
        }
        
        .results-count {
            color: #666;
            font-size: 0.9rem;
        }
        
        .author-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .author-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .author-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .author-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
        }
        
        .author-dynasty {
            padding: 5px 12px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .similarity-score {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .score-bar {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .score-value {
            font-weight: bold;
            color: #667eea;
            min-width: 50px;
            text-align: right;
        }
        
        .common-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .common-word {
            padding: 6px 12px;
            background: white;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #555;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            transition: background 0.3s ease;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .author-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>作者相似度搜索</h1>
            <p>发现风格相近的诗人，探索诗词世界中的文学关联</p>
        </header>
        
        <section class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="authorInput" 
                       placeholder="输入作者名，如：李白、杜甫、苏轼..." autocomplete="off">
                <button class="search-btn" id="searchBtn" onclick="searchSimilarAuthors()">
                    搜索相似作者
                </button>
            </div>
            
            <div class="suggestions" id="suggestions">
                <h3>热门作者</h3>
                <div class="suggestion-tags" id="suggestionTags"></div>
            </div>
        </section>
        
        <section class="results-section" id="resultsSection">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <p>输入作者名开始搜索</p>
            </div>
            <div id="results"></div>
        </section>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link">← 返回首页</a>
            <a href="similarity-network.html" class="nav-link">查看相似度网络图 →</a>
        </nav>
    </div>

    <script>
        // 全局变量
        let authorSimilarityIndex = null;
        let authorIndex = null;
        
        // 初始化
        async function init() {
            try {
                // 加载索引文件
                const [similarityResponse, authorResponse] = await Promise.all([
                    fetch('index/author_similarity_index.json'),
                    fetch('index/author_index.json')
                ]);
                
                if (!similarityResponse.ok) throw new Error('无法加载相似度索引');
                if (!authorResponse.ok) throw new Error('无法加载作者索引');
                
                authorSimilarityIndex = await similarityResponse.json();
                authorIndex = await authorResponse.json();
                
                console.log('索引加载完成');
                console.log(`- 作者总数: ${authorSimilarityIndex.total_authors}`);
                console.log(`- 有相似作者: ${Object.keys(authorSimilarityIndex.similarities).length}`);
                
                // 显示热门作者建议
                showSuggestions();
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError('加载数据失败，请刷新页面重试');
            }
        }
        
        // 显示热门作者建议
        function showSuggestions() {
            const suggestionsDiv = document.getElementById('suggestions');
            const tagsDiv = document.getElementById('suggestionTags');
            
            // 选择诗词数量最多的前10位作者
            const popularAuthors = Object.entries(authorIndex.authors)
                .sort((a, b) => b[1].poem_count - a[1].poem_count)
                .slice(0, 12)
                .map(([name, info]) => name);
            
            tagsDiv.innerHTML = popularAuthors.map(author => 
                `<span class="suggestion-tag" onclick="selectAuthor('${author}')">${author}</span>`
            ).join('');
            
            suggestionsDiv.classList.add('active');
        }
        
        // 选择作者
        function selectAuthor(author) {
            document.getElementById('authorInput').value = author;
            searchSimilarAuthors();
        }
        
        // 搜索相似作者
        async function searchSimilarAuthors() {
            const input = document.getElementById('authorInput');
            const author = input.value.trim();
            
            if (!author) {
                showError('请输入作者名');
                return;
            }
            
            // 显示加载状态
            showLoading();
            
            // 模拟异步操作
            await new Promise(resolve => setTimeout(resolve, 300));
            
            // 查找相似作者
            const similarities = authorSimilarityIndex.similarities[author];
            
            if (!similarities || similarities.length === 0) {
                showNoResults(author);
                return;
            }
            
            // 获取作者信息
            const authorInfo = authorIndex.authors[author] || {};
            
            // 显示结果
            displayResults(author, authorInfo, similarities);
        }
        
        // 显示加载状态
        function showLoading() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在搜索相似作者...</p>
                </div>
            `;
            document.getElementById('emptyState').style.display = 'none';
        }
        
        // 显示无结果
        function showNoResults(author) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <p>未找到 "${author}" 的相似作者</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">该作者可能只有少量诗词，或风格独特</p>
                </div>
            `;
        }
        
        // 显示错误
        function showError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="empty-state" style="color: #e74c3c;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // 显示搜索结果
        function displayResults(author, authorInfo, similarities) {
            const resultsDiv = document.getElementById('results');
            
            const headerHtml = `
                <div class="results-header">
                    <h2>与 "${author}" 风格相似的作者</h2>
                    <span class="results-count">找到 ${similarities.length} 位相似作者</span>
                </div>
            `;
            
            const cardsHtml = similarities.map((sim, index) => {
                const simAuthorInfo = authorIndex.authors[sim.author] || {};
                const score = Math.round(sim.score * 100);
                const commonWords = sim.common_words || [];
                
                return `
                    <div class="author-card" style="animation: fadeIn 0.5s ease ${index * 0.1}s both;">
                        <div class="author-header">
                            <span class="author-name">${sim.author}</span>
                            <span class="author-dynasty">${simAuthorInfo.dynasty || '未知'}</span>
                        </div>
                        <div class="similarity-score">
                            <div class="score-bar">
                                <div class="score-fill" style="width: ${score}%"></div>
                            </div>
                            <span class="score-value">${score}%</span>
                        </div>
                        ${commonWords.length > 0 ? `
                            <div class="common-words">
                                ${commonWords.map(word => 
                                    `<span class="common-word">${word}</span>`
                                ).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            resultsDiv.innerHTML = headerHtml + cardsHtml;
            document.getElementById('emptyState').style.display = 'none';
        }
        
        // 回车键搜索
        document.getElementById('authorInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSimilarAuthors();
            }
        });
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
        
        // 启动
        init();
    </script>
</body>
</html>
