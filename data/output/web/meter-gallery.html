<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格律大全 - 古诗词数据分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: #888;
            font-size: 1.1rem;
        }
        
        .stats-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .stat-card {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        .filters-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group label {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 80px;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        
        .filter-group select option {
            background: #1a1a2e;
        }
        
        .meter-patterns {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .meter-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        
        .meter-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .meter-card.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .meter-pattern {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #667eea;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .meter-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .meter-type {
            color: #aaa;
            font-size: 0.85rem;
        }
        
        .meter-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        
        .meter-visual {
            display: flex;
            gap: 4px;
            margin-top: 10px;
        }
        
        .meter-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .meter-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }
        
        .poems-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .poems-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .poems-header h2 {
            font-size: 1.3rem;
        }
        
        .poem-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 3px solid #667eea;
        }
        
        .poem-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .poem-meta {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .poem-content {
            line-height: 1.8;
            color: #ccc;
            white-space: pre-wrap;
        }
        
        .poem-meter {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            font-size: 0.8rem;
            color: #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            transition: background 0.3s ease;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            border-color: #667eea;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .meter-patterns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>格律大全</h1>
            <p>探索古诗词的格律之美，按格律类型浏览诗词</p>
        </header>
        
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalPatterns">0</div>
                    <div class="stat-label">格律类型</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPoems">0</div>
                    <div class="stat-label">诗词总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgLines">0</div>
                    <div class="stat-label">平均句数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="mostCommon">-</div>
                    <div class="stat-label">最常见格律</div>
                </div>
            </div>
        </section>
        
        <section class="filters-section">
            <div class="filter-group">
                <label>格律筛选:</label>
                <select id="patternFilter">
                    <option value="">全部格律</option>
                </select>
            </div>
            <div class="filter-group">
                <label>句数筛选:</label>
                <select id="linesFilter">
                    <option value="">全部</option>
                    <option value="4">四句</option>
                    <option value="8">八句</option>
                    <option value="other">其他</option>
                </select>
            </div>
        </section>
        
        <section class="meter-patterns" id="meterPatterns">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载格律数据...</p>
            </div>
        </section>
        
        <section class="poems-section" id="poemsSection" style="display: none;">
            <div class="poems-header">
                <h2 id="selectedPattern">诗词列表</h2>
                <span id="poemsCount"></span>
            </div>
            <div id="poemsList"></div>
            <div class="pagination" id="pagination"></div>
        </section>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link">← 返回首页</a>
            <a href="search.html" class="nav-link">智能搜索 →</a>
        </nav>
    </div>

    <script>
        // 全局变量
        let poemsData = [];
        let meterStats = {};
        let currentPattern = null;
        let currentPage = 1;
        const pageSize = 10;
        
        // 初始化
        async function init() {
            try {
                // 加载诗词数据
                const response = await fetch('poems_chunk_000.json');
                if (!response.ok) throw new Error('无法加载诗词数据');
                
                poemsData = await response.json();
                console.log(`加载了 ${poemsData.length} 首诗词`);
                
                // 分析格律统计
                analyzeMeterStats();
                
                // 显示统计
                displayStats();
                
                // 显示格律卡片
                displayMeterPatterns();
                
                // 初始化筛选器
                initFilters();
                
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('meterPatterns').innerHTML = `
                    <div class="empty-state" style="color: #e74c3c;">
                        <p>加载失败: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 分析格律统计
        function analyzeMeterStats() {
            const patternCounts = {};
            const patternPoems = {};
            
            poemsData.forEach(poem => {
                const pattern = poem.meter_pattern || '未知';
                
                if (!patternCounts[pattern]) {
                    patternCounts[pattern] = 0;
                    patternPoems[pattern] = [];
                }
                
                patternCounts[pattern]++;
                patternPoems[pattern].push(poem);
            });
            
            // 构建统计对象
            Object.entries(patternCounts).forEach(([pattern, count]) => {
                const poems = patternPoems[pattern];
                const lines = pattern.split(',').length;
                
                meterStats[pattern] = {
                    count: count,
                    poems: poems,
                    lines: lines,
                    type: getMeterType(pattern, lines)
                };
            });
            
            console.log(`分析了 ${Object.keys(meterStats).length} 种格律`);
        }
        
        // 获取格律类型
        function getMeterType(pattern, lines) {
            if (lines === 4) return '绝句';
            if (lines === 8) return '律诗';
            if (pattern.includes('词')) return '词牌';
            return '古诗';
        }
        
        // 显示统计
        function displayStats() {
            const patterns = Object.keys(meterStats);
            const totalPoems = poemsData.length;
            const avgLines = (poemsData.reduce((sum, p) => {
                const pattern = p.meter_pattern || '';
                return sum + pattern.split(',').length;
            }, 0) / totalPoems).toFixed(1);
            
            // 找出最常见的格律
            const mostCommon = Object.entries(meterStats)
                .sort((a, b) => b[1].count - a[1].count)[0];
            
            document.getElementById('totalPatterns').textContent = patterns.length;
            document.getElementById('totalPoems').textContent = totalPoems;
            document.getElementById('avgLines').textContent = avgLines;
            document.getElementById('mostCommon').textContent = mostCommon ? mostCommon[0] : '-';
        }
        
        // 显示格律卡片
        function displayMeterPatterns(filterPattern = '', filterLines = '') {
            const container = document.getElementById('meterPatterns');
            
            let patterns = Object.entries(meterStats);
            
            // 应用筛选
            if (filterPattern) {
                patterns = patterns.filter(([p, s]) => p === filterPattern);
            }
            
            if (filterLines) {
                if (filterLines === '4') {
                    patterns = patterns.filter(([p, s]) => s.lines === 4);
                } else if (filterLines === '8') {
                    patterns = patterns.filter(([p, s]) => s.lines === 8);
                } else if (filterLines === 'other') {
                    patterns = patterns.filter(([p, s]) => s.lines !== 4 && s.lines !== 8);
                }
            }
            
            // 按数量排序
            patterns.sort((a, b) => b[1].count - a[1].count);
            
            if (patterns.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>没有找到匹配的格律</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = patterns.map(([pattern, stats]) => {
                const maxCount = Math.max(...Object.values(meterStats).map(s => s.count));
                const percentage = (stats.count / maxCount) * 100;
                
                return `
                    <div class="meter-card ${currentPattern === pattern ? 'active' : ''}" 
                         onclick="selectPattern('${pattern}')">
                        <div class="meter-pattern">${pattern}</div>
                        <div class="meter-info">
                            <span class="meter-type">${stats.type} · ${stats.lines}句</span>
                            <span class="meter-count">${stats.count} 首</span>
                        </div>
                        <div class="meter-visual">
                            ${Array(stats.lines).fill(0).map((_, i) => `
                                <div class="meter-bar">
                                    <div class="meter-bar-fill" style="width: ${percentage}%"></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 选择格律
        function selectPattern(pattern) {
            currentPattern = pattern;
            currentPage = 1;
            
            // 更新卡片样式
            document.querySelectorAll('.meter-card').forEach(card => {
                card.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // 显示诗词列表
            displayPoems(pattern);
        }
        
        // 显示诗词列表
        function displayPoems(pattern) {
            const section = document.getElementById('poemsSection');
            const stats = meterStats[pattern];
            
            if (!stats) return;
            
            document.getElementById('selectedPattern').textContent = 
                `${pattern} (${stats.type})`;
            document.getElementById('poemsCount').textContent = 
                `共 ${stats.poems.length} 首`;
            
            section.style.display = 'block';
            
            // 计算分页
            const totalPages = Math.ceil(stats.poems.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pagePoems = stats.poems.slice(start, end);
            
            // 显示诗词
            document.getElementById('poemsList').innerHTML = pagePoems.map((poem, index) => `
                <div class="poem-card" style="animation: fadeIn 0.5s ease ${index * 0.1}s both;">
                    <div class="poem-title">${poem.title}</div>
                    <div class="poem-meta">${poem.author} · ${poem.dynasty}</div>
                    <div class="poem-content">${poem.content}</div>
                    <span class="poem-meter">${poem.meter_pattern || '未知格律'}</span>
                </div>
            `).join('');
            
            // 显示分页
            displayPagination(totalPages);
            
            // 滚动到诗词列表
            section.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 显示分页
        function displayPagination(totalPages) {
            const paginationDiv = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    上一页
                </button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button onclick="changePage(${i})" style="${i === currentPage ? 'background: #667eea;' : ''}">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span style="color: #666;">...</span>`;
                }
            }
            
            html += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    下一页
                </button>
            `;
            
            paginationDiv.innerHTML = html;
        }
        
        // 切换页面
        function changePage(page) {
            if (!currentPattern) return;
            
            const stats = meterStats[currentPattern];
            const totalPages = Math.ceil(stats.poems.length / pageSize);
            
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            displayPoems(currentPattern);
        }
        
        // 初始化筛选器
        function initFilters() {
            const patternSelect = document.getElementById('patternFilter');
            
            Object.entries(meterStats)
                .sort((a, b) => b[1].count - a[1].count)
                .forEach(([pattern, stats]) => {
                    const option = document.createElement('option');
                    option.value = pattern;
                    option.textContent = `${pattern} (${stats.count}首)`;
                    patternSelect.appendChild(option);
                });
            
            // 绑定筛选事件
            patternSelect.addEventListener('change', function() {
                displayMeterPatterns(this.value, document.getElementById('linesFilter').value);
            });
            
            document.getElementById('linesFilter').addEventListener('change', function() {
                displayMeterPatterns(document.getElementById('patternFilter').value, this.value);
            });
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
        
        // 启动
        init();
    </script>
</body>
</html>
