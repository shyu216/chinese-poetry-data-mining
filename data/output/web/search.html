<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能搜索 - 古诗词数据分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .search-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-group label {
            font-size: 0.9rem;
            color: #666;
        }
        
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }
        
        .results-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 400px;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .results-header h2 {
            font-size: 1.3rem;
            color: #333;
        }
        
        .results-count {
            color: #666;
            font-size: 0.9rem;
        }
        
        .poem-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-left: 4px solid #667eea;
        }
        
        .poem-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .poem-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .poem-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .poem-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .poem-content {
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap;
        }
        
        .poem-score {
            display: inline-block;
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            transition: background 0.3s ease;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 10px 20px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>智能诗词搜索</h1>
            <p>基于倒排索引的全文搜索，支持标题、内容、作者搜索</p>
        </header>
        
        <section class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="搜索诗词标题、内容或作者..." autocomplete="off">
                <button class="search-btn" id="searchBtn" onclick="performSearch()">
                    搜索
                </button>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>作者:</label>
                    <select id="authorFilter">
                        <option value="">全部作者</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>朝代:</label>
                    <select id="dynastyFilter">
                        <option value="">全部朝代</option>
                    </select>
                </div>
            </div>
        </section>
        
        <section class="results-section" id="resultsSection">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <p>输入关键词开始搜索</p>
                <p style="font-size: 0.9rem; margin-top: 10px;">支持多关键词搜索，使用空格分隔</p>
            </div>
            <div id="results"></div>
            <div class="pagination" id="pagination"></div>
        </section>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link">← 返回首页</a>
            <a href="author-similarity.html" class="nav-link">作者相似度 →</a>
        </nav>
    </div>

    <script src="js/search_engine.js"></script>
    <script>
        // 全局变量
        let searchEngine = null;
        let currentResults = [];
        let currentPage = 1;
        const pageSize = 10;
        
        // 初始化
        async function init() {
            try {
                // 初始化搜索引擎
                searchEngine = new StaticSearchEngine({
                    indexUrl: 'index/search_index.json',
                    authorIndexUrl: 'index/author_index.json',
                    dynastyIndexUrl: 'index/dynasty_index.json',
                    poemsUrl: 'poems_chunk_000.json'
                });
                
                await searchEngine.init();
                console.log('搜索引擎初始化完成');
                
                // 加载筛选器选项
                await loadFilters();
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError('搜索功能初始化失败，请刷新页面重试');
            }
        }
        
        // 加载筛选器选项
        async function loadFilters() {
            try {
                // 加载作者列表
                const authorResponse = await fetch('index/author_index.json');
                const authorData = await authorResponse.json();
                const authorSelect = document.getElementById('authorFilter');
                
                const authors = Object.entries(authorData.authors)
                    .sort((a, b) => b[1].poem_count - a[1].poem_count)
                    .slice(0, 50); // 只显示前50位作者
                
                authors.forEach(([name, info]) => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = `${name} (${info.poem_count}首)`;
                    authorSelect.appendChild(option);
                });
                
                // 加载朝代列表
                const dynastyResponse = await fetch('index/dynasty_index.json');
                const dynastyData = await dynastyResponse.json();
                const dynastySelect = document.getElementById('dynastyFilter');
                
                Object.entries(dynastyData.dynasties)
                    .sort((a, b) => b[1].poem_count - a[1].poem_count)
                    .forEach(([name, info]) => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = `${name} (${info.poem_count}首)`;
                        dynastySelect.appendChild(option);
                    });
                    
            } catch (error) {
                console.error('加载筛选器失败:', error);
            }
        }
        
        // 执行搜索
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const authorFilter = document.getElementById('authorFilter').value;
            const dynastyFilter = document.getElementById('dynastyFilter').value;
            
            if (!query && !authorFilter && !dynastyFilter) {
                showError('请输入搜索词或选择筛选条件');
                return;
            }
            
            // 显示加载状态
            showLoading();
            
            try {
                // 构建筛选条件
                const filters = {};
                if (authorFilter) filters.author = authorFilter;
                if (dynastyFilter) filters.dynasty = dynastyFilter;
                
                // 执行搜索
                const results = await searchEngine.search(query, filters);
                currentResults = results;
                currentPage = 1;
                
                // 显示结果
                displayResults();
                
            } catch (error) {
                console.error('搜索失败:', error);
                showError('搜索失败: ' + error.message);
            }
        }
        
        // 显示加载状态
        function showLoading() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在搜索...</p>
                </div>
            `;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('pagination').innerHTML = '';
        }
        
        // 显示错误
        function showError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="empty-state" style="color: #e74c3c;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // 显示搜索结果
        function displayResults() {
            const resultsDiv = document.getElementById('results');
            
            if (currentResults.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <p>未找到匹配的诗词</p>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            // 计算分页
            const totalPages = Math.ceil(currentResults.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageResults = currentResults.slice(start, end);
            
            // 显示结果头部
            const headerHtml = `
                <div class="results-header">
                    <h2>搜索结果</h2>
                    <span class="results-count">共 ${currentResults.length} 首 (第 ${currentPage}/${totalPages} 页)</span>
                </div>
            `;
            
            // 显示诗词卡片
            const cardsHtml = pageResults.map((result, index) => {
                const poem = result.poem;
                const score = Math.round(result.score * 100);
                
                return `
                    <div class="poem-card" style="animation: fadeIn 0.5s ease ${index * 0.1}s both;">
                        <div class="poem-title">${poem.title}</div>
                        <div class="poem-meta">
                            <span>👤 ${poem.author}</span>
                            <span>📜 ${poem.dynasty}</span>
                            <span>📋 ${poem.poem_type}</span>
                        </div>
                        <div class="poem-content">${poem.content}</div>
                        <span class="poem-score">相关度: ${score}%</span>
                    </div>
                `;
            }).join('');
            
            resultsDiv.innerHTML = headerHtml + cardsHtml;
            document.getElementById('emptyState').style.display = 'none';
            
            // 显示分页
            displayPagination(totalPages);
        }
        
        // 显示分页
        function displayPagination(totalPages) {
            const paginationDiv = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    上一页
                </button>
            `;
            
            // 显示页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button onclick="changePage(${i})" style="${i === currentPage ? 'background: #667eea; color: white;' : ''}">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            
            html += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    下一页
                </button>
            `;
            
            paginationDiv.innerHTML = html;
        }
        
        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(currentResults.length / pageSize);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            displayResults();
            
            // 滚动到结果顶部
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
        
        // 筛选器变化时自动搜索
        document.getElementById('authorFilter').addEventListener('change', function() {
            if (document.getElementById('searchInput').value.trim()) {
                performSearch();
            }
        });
        
        document.getElementById('dynastyFilter').addEventListener('change', function() {
            if (document.getElementById('searchInput').value.trim()) {
                performSearch();
            }
        });
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
        
        // 启动
        init();
    </script>
</body>
</html>
